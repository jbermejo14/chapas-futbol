<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600">
  <!-- Franja azafrán (Superior) -->
  <rect width="900" height="200" y="0" fill="#FF671F"/>
  
  <!-- Franja blanca (Central) -->
  <rect width="900" height="200" y="200" fill="#FFFFFF"/>
  
  <!-- Franja verde (Inferior) -->
  <rect width="900" height="200" y="400" fill="#046A38"/>
  
  <!-- Ashoka Chakra (Rueda central azul marino) -->
  <g transform="translate(450, 300)">
    <!-- Anillo exterior de la rueda -->
    <circle r="80" fill="none" stroke="#06038D" stroke-width="12"/>
    
    <!-- Eje central -->
    <circle r="16" fill="#06038D"/>
    
    <!-- 24 radios espaciados cada 15 grados -->
    <g fill="#06038D">
      <g><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(15)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(30)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(45)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(60)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(75)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(90)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(105)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(120)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(135)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(150)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(165)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(180)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(195)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(210)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(225)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(240)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(255)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(270)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(285)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(300)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(315)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(330)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
      <g transform="rotate(345)"><polygon points="-4,-16 4,-16 0,-74"/><circle cx="0" cy="-74" r="3.5"/></g>
