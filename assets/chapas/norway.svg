<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 320">
  <!-- Fondo rojo -->
  <rect width="440" height="320" fill="#BA0C2F"/>
  
  <!-- Cruz blanca (base para la cruz azul) -->
  <!-- Franja horizontal blanca -->
  <rect x="0" y="120" width="440" height="80" fill="#FFFFFF"/>
  <!-- Franja vertical blanca -->
  <rect x="120" y="0" width="80" height="320" fill="#FFFFFF"/>
  
  <!-- Cruz azul (superpuesta) -->
  <!-- Franja horizontal azul -->
  <rect x="0" y="140" width="440" height="40" fill="#00205B"/>
  <!-- Franja vertical azul -->
  <rect x="140" y="0" width="40" height="320" fill="#00205B"/>
</svg>
